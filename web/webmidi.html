<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        width: 100vw;
        height: 100vh;
        position: absolute;
        left: 0;
        top: 0;
        margin: 0;
        overflow: hidden;
      }
      textarea {
        position: absolute;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        border-radius: 0;
      }
    </style>
  </head>
  <body>
    <textarea name="log" id="log" style="width: 100%; height: 100%"></textarea>

    <script>
      let proto = null;
      let midi = null;
      let wakeLock = null;
      const openInputs = {};
      const openOutputs = {};

      const STATE_PREINIT = 0;
      const STATE_RUNNING = 1;
      class ProtoRemidi {
        constructor(ws) {
          this.ws = ws;
          this.prefix = ord("R");
          this.state = STATE_PREINIT;
          this.callback = () => {};
        }

        parse(data) {
          if (this.state == STATE_PREINIT) this.$_parse_state_preinit(data);
          else if (this.state == STATE_RUNNING)
            this.$_parse_state_running(data);
        }

        $_buffer_startswith(data, name) {
          if (data.length < name.length) return false;

          for (const i in name) {
            if (name.charCodeAt(i) != data.at(i)) return false;
          }

          return true;
        }

        $_parse_state_preinit(data) {
          if (!this.$_buffer_startswith(data, "REMIDI")) return;

          const ver_maj = data.at(6);
          const ver_min = data.at(7);

          if (ver_maj != 1 && ver_min != 0) {
            console.error(
              `No version found! Server reported version ${ver_maj}.${ver_min}`,
            );
            return;
          }

          this.state = STATE_RUNNING;
          log("STATE_RUNNING")
          this.callback();
        }

        $_parse_state_running(data) {
          if (data.length < 1 || data.at(0) != this.prefix)
            return;

          if (data[1] == 0) {
            const io = data[2];
            const port = data[3];
            const name = String.fromCharCode(...data.slice(4));

            if (io == ord("I")) openInputDevice(name, port);
            else openOutputDevice(name, port);
          } else if (data[1] == 1) {
            const io = data[2];
            const port = data[3];

            if (io == ord("I")) {
              log(`Close: IN${port}`);
              openInputs[port].onmidimessage = () => {};
              delete openInputs[port];
            } else {
              log(`Close: OUT${port}`);
              delete openOutputs[port];
            }
          } else if (data[1] == 2) {
            const port = data[2];
            const mididata = data.slice(3);

            const midiport = openOutputs[port];
            if (midiport !== undefined) midiport.send(mididata);
            else log("ERR opened port not found!");
          }
        }

        sendConnect(io, name) {
          const arr = [this.prefix, 3, ord(io)];

          for (const i in name) {
            arr.push(name.charCodeAt(i));
          }

          this.ws.send(new Uint8Array(arr));
        }

        sendDisconnect(io, name) {
          const arr = [this.prefix, 4, ord(io)];

          for (const i in name) {
            arr.push(name.charCodeAt(i));
          }

          this.ws.send(new Uint8Array(arr));
        }

        sendData(port, data) {
          this.ws.send(new Uint8Array([this.prefix, 2, port, ...data]));
        }

        sendInit() {
          const arr = [];
          const name = "REMIDI";
          for (const c in name) {
            arr.push(name.charCodeAt(c));
          }

          // Version 1.0
          arr.push(1, 0, this.prefix);

          this.ws.send(new Uint8Array(arr));
        }
      }

      const requestWakeLock = async () => {
        try {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        } catch (err) {
          log(`Wake Lock request failed: ${err}`);
        }
      }

      const  ensureWakeLock = async () => {
        if ("wakeLock" in navigator) await requestWakeLock();
        else log(`Wake Lock API not supported`);
      }

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") ensureWakeLock();
      });

      window.onerror = (a, b, c, d, e) => {
        log(`Error: ${e}`);
        log(`Message: ${a}`);
        log(`File: ${b}:${c}`);

        return true;
      };

      const ord = (c) => c.charCodeAt(0);
      const uniqueName = (port, seenCount) => port.id + ";" + port.name + ";" + seenCount;

      const iterInputs = (callback) => iterPorts(callback, midi.inputs);
      const iterOutputs = (callback) => iterPorts(callback, midi.outputs);
      const iterPorts = (callback, ports) => {
        const seenNames = {};

        for (const i of ports.values()) {
          const portname = i.name;
          seenNames[portname] = (seenNames[portname] || 0) + 1;

          const uniquename = uniqueName(i, seenNames[portname] - 1);

          if (!callback(i, uniquename)) break;
        }
      };

      const LOG = document.getElementById("log");
      const log = (msg) => {
        LOG.value += msg + "\n";
        LOG.scrollTop = LOG.scrollHeight;
      };

      const initMidi = async (callback) => {
        if (!navigator.requestMIDIAccess) {
          log("Request function not existing");
          return null;
        }

        try {
          midi = await navigator.requestMIDIAccess({ sysex: true });
          log("MIDI ok");

          const ws = new WebSocket("/api/v1/remidi");
          ws.binaryType = "arraybuffer";
          proto = new ProtoRemidi(ws);
          ws.onmessage = (e) => proto.parse(new Uint8Array(e.data));
          ws.onopen = callback;
        } catch (err) {
          log("Failed request");
          log(err);
          console.error(err);
        }
      };

      const openInputDevice = (reqname, port) => {
        ensureWakeLock();
        log(`Open: ${reqname}`);

        iterInputs((input, name) => {
          if (name != reqname) return true;

          openInputs[port] = input;
          input.onmidimessage = (event) => {
            proto.sendData(port, event.data);
          };
          log("Found");
          return false;
        });
      };

      const openOutputDevice = (reqname, port) => {
        ensureWakeLock();
        log(`Open: ${reqname}`);

        iterOutputs((output, name) => {
          if (name != reqname) return true;

          openOutputs[port] = output;
          log("Found")
          return false;
        });
      };

      const hasOpenedPort = (port) => {
        for (const i of Object.keys(openInputs)) {
          if (openInputs[i] == port) return true;
        }

        for (const o of Object.keys(openOutputs)) {
          if (openOutputs[o] == port) return true;
        }

        return false;
      };

      const listDevices = () => {
        iterInputs((input, name) => {
          log(`Sending connect IN ${name}`);
          proto.sendConnect("I", name);

          return true;
        });

        iterOutputs((output, name) => {
          log(`Sending connect OUT ${name}`);
          proto.sendConnect("O", name);

          return true;
        })
      };

      (async () => {
        const remidiInitCallback = () => {
          listDevices();

          midi.onstatechange = (e) => {
            const port = e.port;
            const type = port.type[0].toUpperCase();
            const itr = type == "I" ? iterInputs : iterOutputs;
            
            log(`${port.state} > ${port.name}`);

            if (port.state == "connected") {
              if (hasOpenedPort(port)) return;

              itr((iport, name) => {
                if (iport !== port) return true;

                proto.sendConnect(type, name);
                return false;
              });

              if (wakeLock === null) ensureWakeLock();

            } else if (port.state == "disconnected") {
              itr((iport, name) => {
                if (iport !== port) return true;

                proto.sendDisconnect(type, name);
              });

              if (type == "I") {
                for (const k of Object.keys(openInputs)) {
                  if (openInputs[k] == port) {
                    delete openInputs[k];
                    break;
                  }
                }
              } else {
                for (const k of Object.keys(openOutputs)) {
                  if (openOutputs[k] == port) {
                    delete openOutputs[k];
                    break;
                  }
                }
              }

              if (
                Object.keys(openInputs).length === 0 &&
                Object.keys(openOutputs).length === 0 &&
                wakeLock !== null
              )
                wakeLock.release();
            }
          };
        };

        await initMidi(() => {
          proto.callback = remidiInitCallback;
          proto.sendInit();
        });
      })();
    </script>
  </body>
</html>
